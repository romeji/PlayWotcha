<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YGG+ Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #141414;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .controls {
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #222;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      background: #333;
    }

    .card-content {
      padding: 10px;
    }

    .rating {
      color: #f5c518;
    }

    .status {
      padding: 10px 20px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">🎬 YGG+ Streaming</div>

<div class="status" id="status">Chargement...</div>

<div class="controls">
  <input id="search" placeholder="Rechercher..." oninput="applyFilters()">

  <select id="typeFilter" onchange="applyFilters()">
    <option value="all">Tout</option>
    <option value="movie">Films</option>
    <option value="tv">Séries</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script>

let data = [];
let filtered = [];

/* =========================
   LOAD VIA VERCEL PROXY
========================= */
async function load() {
  const status = document.getElementById("status");

  try {
    status.innerText = "Chargement des films...";

    const res = await fetch("/api/content");
    const json = await res.json();

    console.log("API RESPONSE:", json);

    // 🔥 normalisation safe
    if (json.success && Array.isArray(json.data)) {
      data = json.data;
      status.innerText = `✔ ${data.length} films chargés`;
    } else {
      data = [];
      status.innerText = "⚠ fallback vide ou YGG bloqué";
    }

    filtered = data;
    render();

  } catch (e) {
    console.error(e);
    status.innerText = "❌ Erreur API";
    data = [];
    filtered = [];
    render();
  }
}

/* =========================
   RENDER GRID
========================= */
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if (!Array.isArray(filtered)) filtered = [];

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.poster || 'https://via.placeholder.com/300x450?text=No+Image'}" />
      <div class="card-content">
        <div>${item.title || "Sans titre"}</div>
        <div class="rating">⭐ ${item.rating || "N/A"}</div>
      </div>
    `;

    grid.appendChild(div);
  });
}

/* =========================
   FILTERS
========================= */
function applyFilters() {
  const query = document.getElementById("search").value.toLowerCase();
  const type = document.getElementById("typeFilter").value;

  filtered = data.filter(item => {
    const title = (item.title || "").toLowerCase();
    const matchSearch = title.includes(query);
    const matchType = type === "all" || item.type === type;
    return matchSearch && matchType;
  });

  render();
}

/* =========================
   INIT
========================= */
load();

</script>

</body>
</html>
