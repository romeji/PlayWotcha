<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YGG+ Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #141414;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .controls {
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #222;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      background: #333;
    }

    .card-content {
      padding: 10px;
    }

    .rating {
      color: #f5c518;
    }
  </style>
</head>

<body>

<div class="header">🎬 YGG+ Streaming</div>

<div class="controls">
  <input id="search" placeholder="Rechercher..." oninput="applyFilters()">

  <select id="typeFilter" onchange="applyFilters()">
    <option value="all">Tout</option>
    <option value="movie">Films</option>
    <option value="tv">Séries</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script>
let data = [];
let filtered = [];
console.log("DATA =", data);
/* =========================
   LOAD API
========================= */
async function load() {
  try {
    console.log("Trying server...");

    const res = await fetch('/api/content');
    const json = await res.json();

    // ✔ si serveur OK
    if (Array.isArray(json) && json.length > 0) {
      data = json;
    } else {
      console.log("Server empty → trying browser YGG");

      // 🔥 fallback navigateur DIRECT
      const r = await fetch(
        "https://yggtorrent.org/api/v2/torrents?category=2145&sort=seeders&order=desc&limit=20"
      );

      const text = await r.text();

      if (text.startsWith("{") || text.startsWith("[")) {
        const ygg = JSON.parse(text);

        data = (ygg.torrents || []).map(t => ({
          title: t.name,
          rating: t.seeders,
          type: "movie",
          poster: ""
        }));
      } else {
        data = [];
      }
    }

    filtered = data;
    render();

  } catch (e) {
    console.error(e);
    data = [];
    filtered = [];
    render();
  }
}

/* =========================
   RENDER GRID
========================= */
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!Array.isArray(filtered)) filtered = [];

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${item.poster || 'https://via.placeholder.com/300x450?text=No+Image'}" />
      <div class="card-content">
        <div>${item.title || 'Sans titre'}</div>
        <div class="rating">⭐ ${item.rating || 'N/A'}</div>
      </div>
    `;

    grid.appendChild(div);
  });
}

/* =========================
   FILTERS
========================= */
function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;

  filtered = data.filter(item => {
    const title = (item.title || '').toLowerCase();
    const matchSearch = title.includes(query);
    const matchType = type === 'all' || item.type === type;
    return matchSearch && matchType;
  });

  render();
}

/* =========================
   INIT
========================= */
load();
</script>

</body>
</html>
